<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VulnSight X - Advanced Pentesting Framework</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
        }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .dark {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .scan-progress {
            transition: width 0.5s ease;
        }
        
        .vuln-critical { background: #ef4444; }
        .vuln-high { background: #f59e0b; }
        .vuln-medium { background: #eab308; }
        .vuln-low { background: #10b981; }
        
        .sidebar-item {
            transition: all 0.3s ease;
        }
        
        .sidebar-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .scanning {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <div class="w-64 glass-effect m-4 rounded-2xl p-4">
            <div class="mb-8">
                <h1 class="text-2xl font-bold bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">
                    VulnSight X
                </h1>
                <p class="text-xs text-gray-400 mt-1">Advanced Pentesting Framework</p>
            </div>
            
            <nav class="space-y-2">
                <div class="sidebar-item p-3 rounded-lg cursor-pointer bg-purple-600 bg-opacity-20">
                    <div class="flex items-center space-x-3">
                        <span>🎯</span>
                        <span>Dashboard</span>
                    </div>
                </div>
                <div class="sidebar-item p-3 rounded-lg cursor-pointer hover:bg-white hover:bg-opacity-10">
                    <div class="flex items-center space-x-3">
                        <span>🔍</span>
                        <span>Scanner</span>
                    </div>
                </div>
                <div class="sidebar-item p-3 rounded-lg cursor-pointer hover:bg-white hover:bg-opacity-10">
                    <div class="flex items-center space-x-3">
                        <span>🔄</span>
                        <span>Interceptor</span>
                    </div>
                </div>
                <div class="sidebar-item p-3 rounded-lg cursor-pointer hover:bg-white hover:bg-opacity-10">
                    <div class="flex items-center space-x-3">
                        <span>📊</span>
                        <span>Results</span>
                    </div>
                </div>
                <div class="sidebar-item p-3 rounded-lg cursor-pointer hover:bg-white hover:bg-opacity-10">
                    <div class="flex items-center space-x-3">
                        <span>⚙️</span>
                        <span>Plugins</span>
                    </div>
                </div>
            </nav>
            
            <div class="absolute bottom-8 left-8">
                <div class="text-xs text-gray-400">v1.0.0 | MIT License</div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="flex-1 overflow-y-auto p-4">
            <!-- Dashboard View -->
            <div id="dashboardView">
                <!-- Stats Cards -->
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                    <div class="glass-effect rounded-2xl p-4">
                        <div class="text-gray-400 text-sm">Total Vulnerabilities</div>
                        <div class="text-3xl font-bold" id="totalVulns">0</div>
                    </div>
                    <div class="glass-effect rounded-2xl p-4">
                        <div class="text-gray-400 text-sm">Critical</div>
                        <div class="text-3xl font-bold text-red-500" id="criticalVulns">0</div>
                    </div>
                    <div class="glass-effect rounded-2xl p-4">
                        <div class="text-gray-400 text-sm">High</div>
                        <div class="text-3xl font-bold text-orange-500" id="highVulns">0</div>
                    </div>
                    <div class="glass-effect rounded-2xl p-4">
                        <div class="text-gray-400 text-sm">Risk Score</div>
                        <div class="text-3xl font-bold" id="riskScore">0</div>
                    </div>
                </div>
                
                <!-- Risk Gauge -->
                <div class="glass-effect rounded-2xl p-6 mb-6">
                    <h3 class="text-lg font-semibold mb-4">Overall Risk Score</h3>
                    <canvas id="riskGauge" width="400" height="200"></canvas>
                </div>
                
                <!-- Recent Scans -->
                <div class="glass-effect rounded-2xl p-6">
                    <h3 class="text-lg font-semibold mb-4">Recent Scans</h3>
                    <div id="recentScans" class="space-y-2"></div>
                </div>
            </div>
            
            <!-- Scanner View (Hidden by default) -->
            <div id="scannerView" class="hidden">
                <div class="glass-effect rounded-2xl p-6 mb-6">
                    <h3 class="text-lg font-semibold mb-4">New Security Scan</h3>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium mb-2">Target URL</label>
                            <input type="text" id="targetUrl" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-purple-500" placeholder="https://example.com">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium mb-2">Scan Mode</label>
                            <select id="scanMode" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-purple-500">
                                <option value="Passive">Passive (Low & Safe)</option>
                                <option value="Active">Active (Standard)</option>
                                <option value="Aggressive">Aggressive (Full Attack)</option>
                            </select>
                        </div>
                        
                        <button onclick="startScan()" class="w-full bg-purple-600 hover:bg-purple-700 rounded-lg px-4 py-2 font-semibold transition">
                            Start Scan
                        </button>
                    </div>
                </div>
                
                <!-- Scan Progress -->
                <div id="scanProgress" class="glass-effect rounded-2xl p-6 mb-6 hidden">
                    <h3 class="text-lg font-semibold mb-4">Scan Progress</h3>
                    <div class="w-full bg-gray-700 rounded-full h-4">
                        <div id="progressBar" class="bg-purple-600 h-4 rounded-full transition-all duration-300" style="width: 0%"></div>
                    </div>
                    <div id="scanLogs" class="mt-4 h-64 overflow-y-auto bg-gray-800 rounded-lg p-4 font-mono text-xs"></div>
                </div>
                
                <!-- Scan Results -->
                <div id="scanResults" class="hidden">
                    <div class="glass-effect rounded-2xl p-6">
                        <h3 class="text-lg font-semibold mb-4">Vulnerabilities Found</h3>
                        <div id="vulnTable" class="overflow-x-auto"></div>
                        <button onclick="downloadReport()" class="mt-4 bg-green-600 hover:bg-green-700 rounded-lg px-4 py-2 font-semibold transition">
                            Download HTML Report
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- Interceptor View -->
            <div id="interceptorView" class="hidden">
                <div class="glass-effect rounded-2xl p-6">
                    <h3 class="text-lg font-semibold mb-4">HTTP Interceptor</h3>
                    
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <button onclick="showRequestEditor()" class="bg-purple-600 hover:bg-purple-700 rounded-lg px-4 py-2">New Request</button>
                        <button onclick="showHistory()" class="bg-gray-700 hover:bg-gray-600 rounded-lg px-4 py-2">History</button>
                    </div>
                    
                    <div id="requestEditor">
                        <div class="mb-4">
                            <label class="block text-sm font-medium mb-2">Method</label>
                            <select id="reqMethod" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2">
                                <option>GET</option>
                                <option>POST</option>
                                <option>PUT</option>
                                <option>DELETE</option>
                            </select>
                        </div>
                        
                        <div class="mb-4">
                            <label class="block text-sm font-medium mb-2">URL</label>
                            <input type="text" id="reqUrl" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2" placeholder="https://example.com/api">
                        </div>
                        
                        <div class="mb-4">
                            <label class="block text-sm font-medium mb-2">Headers (JSON)</label>
                            <textarea id="reqHeaders" rows="3" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 font-mono text-sm" placeholder='{"User-Agent": "VulnSight-X"}'></textarea>
                        </div>
                        
                        <div class="mb-4">
                            <label class="block text-sm font-medium mb-2">Body</label>
                            <textarea id="reqBody" rows="5" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 font-mono text-sm"></textarea>
                        </div>
                        
                        <button onclick="sendRequest()" class="bg-blue-600 hover:bg-blue-700 rounded-lg px-4 py-2 font-semibold transition">
                            Send Request
                        </button>
                    </div>
                    
                    <div id="responseDisplay" class="mt-6 hidden">
                        <h4 class="font-semibold mb-2">Response</h4>
                        <div id="responseContent" class="bg-gray-800 rounded-lg p-4 font-mono text-sm overflow-x-auto"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
